<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
</head>
<body>
<div id = 'tab'>
    <input type="text" id="result" readonly >
    <div id = 'button'>
        <button onclick="display_form('1')">1</button>
        <button onclick="display_form('2')">2</button>
        <button onclick="display_form('3')">3</button>
        <button onclick="display_form('4')">4</button>
        <button onclick="display_form('5')">5</button>
        <button onclick="display_form('6')">6</button>
        <button onclick="display_form('7')">7</button>
        <button onclick="display_form('8')">8</button>
        <button onclick="display_form('9')">9</button>
        <button onclick="display_form('0')">0</button>
        <button onclick="display_form('+')">+</button>
        <button onclick="display_form('-')">-</button>
        <button onclick="display_form('/')">/</button>
        <button onclick="display_form('*')">*</button>
        <button onclick="calculate_value()">=</button>
        <button onclick="display_form('.')">.</button>
        <button onclick="clear_display_form()">AC</button>
    </div>
</div>
<script src = 'script.js'></script>
</body>
</html>
